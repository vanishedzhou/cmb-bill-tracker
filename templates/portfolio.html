<!-- Generated by claude-internal tools. -->
{% extends "base.html" %}
{% block title %}Portfolio Breakdown - 投资持仓{% endblock %}
{% block page_title %}Portfolio Breakdown{% endblock %}

{% block content %}
<div class="card">
    <div class="portfolio-toolbar">
        <h3>📊 投资持仓明细</h3>
        <div class="btn-group">
            <button class="btn btn-primary" onclick="Portfolio.addRow()">➕ 添加行</button>
            <button class="btn btn-primary" onclick="Portfolio.saveAll()">💾 保存全部</button>
        </div>
    </div>

    <div class="portfolio-summary" id="portfolioSummary">
        <!-- Filled by JS -->
    </div>

    <div class="table-wrapper">
        <table class="portfolio-table" id="portfolioTable">
            <thead>
                <tr>
                    <th class="col-cat">大类</th>
                    <th class="col-subcat">子类</th>
                    <th class="col-item">具体项</th>
                    <th class="col-num">头寸</th>
                    <th class="col-num">现价</th>
                    <th class="col-num">汇率</th>
                    <th class="col-num">成本</th>
                    <th class="col-num">盈亏</th>
                    <th class="col-num">市值(万)</th>
                    <th class="col-num">仓位</th>
                    <th class="col-num">大类仓位</th>
                    <th class="col-actions">操作</th>
                </tr>
            </thead>
            <tbody id="portfolioBody">
                <tr><td colspan="12" class="loading-text">加载中...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<div class="card">
    <h3>📈 大类仓位分布</h3>
    <div class="portfolio-chart-row">
        <div class="chart-container" style="height:320px; max-width:500px;">
            <canvas id="categoryPieChart"></canvas>
        </div>
        <div id="categoryBreakdown" class="category-breakdown">
            <!-- Filled by JS -->
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ prefix }}/static/js/portfolio.js"></script>
{% endblock %}
